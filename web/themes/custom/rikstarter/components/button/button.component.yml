$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Button
status: stable
description: A button component with primary and secondary variants.
group: Atoms
props:
  type: object
  required:
    - label
  properties:
    label:
      type: string
      title: Label
      description: The visible text of the button.
    variant:
      type: string
      title: Variant
      description: Visual style of the button.
      default: primary
      enum:
        - primary
        - secondary
    disabled:
      type: boolean
      title: Disabled
      description: Whether the button is disabled.
      default: false
    type:
      type: string
      title: Type attribute
      description: HTML button type attribute.
      default: button
      enum:
        - button
        - submit
        - reset
    url:
      type: string
      title: URL
      description: Optional URL to render the button as an anchor tag.
slots:
  icon:
    title: Icon
    description: Optional icon to display before the label.
libraryOverrides:
  css:
    component:
      button.css: {}
